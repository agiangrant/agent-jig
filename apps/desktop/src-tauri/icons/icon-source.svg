<!-- Jig app icon source. Regenerate the full platform set by running, from the
     repo root: pnpm tauri icon (scoped to the desktop package) on this file.
     The node-graph "J" mark sits on a near-black rounded-square tile. It's built
     like a slab-serif capital "I" with the bottom-right serif removed: a full
     top bar (two end circles + a center junction), a center spine, and a left
     foot at the bottom (an open corner node + a boxy accent square). Subtle
     gradients add shading (top-light tile, sheen on the nodes, depth on the
     accent foot). To recolor: edit the gradient stops in <defs> below. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Tile: faint top-light so the black isn't a flat void -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181d"/>
      <stop offset="0.55" stop-color="#050608"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <!-- Ink: a soft vertical sheen on the light nodes -->
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde3e3"/>
    </linearGradient>
    <!-- Accent: depth on the boxy foot -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#63e1ef"/>
      <stop offset="1" stop-color="#33bbce"/>
    </linearGradient>
  </defs>
  <!-- Background tile -->
  <rect width="1024" height="1024" rx="224" fill="url(#tile)"/>
  <!-- Mark: 128-unit artwork, centered with safe-area padding (scale 6, 128px inset). -->
  <g transform="translate(128 128) scale(6)" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- Edges (drawn under the nodes): top bar, then spine down + foot left -->
    <g stroke="#f4f6f6" stroke-opacity="0.92" stroke-width="8">
      <path d="M 22 28 H 106"/>
      <path d="M 64 28 V 100 H 22"/>
    </g>
    <!-- Top bar: two end circles + a center junction -->
    <circle cx="22" cy="28" r="11" fill="url(#ink)"/>
    <circle cx="64" cy="28" r="11" fill="url(#ink)"/>
    <circle cx="106" cy="28" r="11" fill="url(#ink)"/>
    <!-- Open corner node where the spine turns into the foot -->
    <circle cx="64" cy="100" r="9" fill="#050608" stroke="#f4f6f6" stroke-width="6"/>
    <!-- Boxy accent square at the foot's end -->
    <rect x="10" y="88" width="24" height="24" rx="4" fill="url(#accent)"/>
  </g>
</svg>
